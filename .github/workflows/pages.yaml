name: Deploy to GitHub Pages

on:
  workflow_run:
    branches:
      - main
    workflows:
      - LaTeX
      - Typst
    types:
      - completed

  # Enable manually triggering the workflow.
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
        # Files used in this workflow
      - '.github/scripts/generate_index.py'
        # Relevant CI configs
      - '.github/workflows/pages.yaml' # this file

jobs:
  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: read

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Aggregate artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the last successful run ID for LaTeX
          LATEX_RUN_ID=$(gh run list --workflow latex.yaml --status success --limit 1 --json databaseId --jq '.[0].databaseId // empty')
          # Get the last successful run ID for Typst
          TYPST_RUN_ID=$(gh run list --workflow typst.yaml --status success --limit 1 --json databaseId --jq '.[0].databaseId // empty')

          mkdir -p deploy/vtrmc/tex
          mkdir -p deploy/vtrmc/typ

          # Download artifacts from the latest successful runs.
          if [ -n "$LATEX_RUN_ID" ]; then
            gh run download "$LATEX_RUN_ID" --name latex-artifacts --dir deploy/vtrmc/tex
          else
            echo "LaTeX artifacts not found"
          fi

          if [ -n "$TYPST_RUN_ID" ]; then
            gh run download "$TYPST_RUN_ID" --name typst-artifacts --dir deploy/vtrmc/typ
          else
            echo "Typst artifacts not found"
          fi

      - name: Install Pandoc
        run: |
          sudo apt install -qq -y pandoc

      - name: Generate index page
        run: |
          cp .github/scripts/generate_index.py deploy/
          cd deploy
          python3 generate_index.py
          pandoc -f markdown -t html -s index.md -o index.html \
              --metadata title="Virginia Tech Regional Math Contest (VTRMC) problems and solutions"
          rm generate_index.py index.md

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
